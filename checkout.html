<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sandy's Max - Secure Checkout</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
    header, footer { background-color: #e91e63; color: white; padding: 15px; text-align: center; }
    main { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input, select, #card-element { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
    button { width: 100%; padding: 12px; background-color: #e91e63; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
    .error { color: red; margin-bottom: 10px; }
    .total { font-weight: bold; margin-top: -10px; margin-bottom: 20px; }
  </style>
</head>
<body>

  <header><h1>Sandy's Max - Checkout</h1></header>

  <main>
    <form id="payment-form">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="text" id="address" placeholder="Shipping Address" required>

      <label for="product">Select Bag</label>
      <select id="product">
        <option value="Fashion Shoulder Phone Bag 2024">Fashion Shoulder Phone Bag 2024 - $14.92</option>
        <option value="Kalanta OEM Genuine Leather Ladies Purses and Handbags">Kalanta OEM Genuine Leather Ladies Purses and Handbags - $26.78</option>
        <option value="Triangle Shaped High Quality Bags">Triangle Shaped High Quality Bags - $13.52</option>
        <option value="Man's Large Capacity PU Material Chest Bag with USB">Man's Large Capacity PU Material Chest Bag with USB - $10.99</option>
        <option value="Fashion Box Bags PU Handbags">Fashion Box Bags PU Handbags - $13.99</option>
        <option value="New Fashion Styled Square Bag">New Fashion Styled Square Bag - $17.99</option>
      </select>

      <label for="quantity">Quantity</label>
      <select id="quantity">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>

      <p class="total">Total: $<span id="calculated-total">0.00</span></p>

      <div id="card-element"></div>
      <div id="card-errors" class="error"></div>
      <button type="submit">Place Order</button>
    </form>
  </main>

  <footer>&copy; 2025 Sandy's Max</footer>

  <script>
    const stripe = Stripe("pk_live_51RNjrlFZYifFS4DgmRbtwsOUisnpLgHF8hHvfUaH8yxtulWKmOY3DB5Q6gYhzlPSSOhMMQQ0BUsoZ8rndMJ2Icmi00szW9JlyA");
    const elements = stripe.elements();
    const card = elements.create("card");
    card.mount("#card-element");

    const taxRate = 0.07;  // 7% tax
    const shippingFee = 4.00; // $4 shipping

    const productPrices = {
      "Fashion Shoulder Phone Bag 2024": 14.92,
      "Kalanta OEM Genuine Leather Ladies Purses and Handbags": 26.78,
      "Triangle Shaped High Quality Bags": 13.52,
      "Man's Large Capacity PU Material Chest Bag with USB": 10.99,
      "Fashion Box Bags PU Handbags": 13.99,
      "New Fashion Styled Square Bag": 17.99
    };

    const productEl = document.getElementById("product");
    const quantityEl = document.getElementById("quantity");
    const totalEl = document.getElementById("calculated-total");

    function updateTotal() {
      const selectedProduct = productEl.value;
      const pricePerItem = productPrices[selectedProduct];
      const quantity = parseInt(quantityEl.value);
      const subtotal = pricePerItem * quantity;
      const tax = subtotal * taxRate;
      const total = subtotal + tax + shippingFee;
      totalEl.textContent = total.toFixed(2);
    }

    productEl.addEventListener("change", updateTotal);
    quantityEl.addEventListener("change", updateTotal);
    updateTotal();

    const form = document.getElementById("payment-form");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const address = document.getElementById("address").value;
      const selectedProduct = productEl.value;
      const pricePerItem = productPrices[selectedProduct];
      const quantity = parseInt(quantityEl.value);

      const subtotal = pricePerItem * quantity;
      const tax = subtotal * taxRate;
      const total = subtotal + tax + shippingFee;
      const totalCents = Math.round(total * 100);

      const res = await fetch("https://sandys-max.onrender.com/create-payment-intent", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          amount: totalCents,
          customerEmail: email,
          customerName: name,
          shippingAddress: address,
          cart: [
            {
              name: selectedProduct,
              quantity: quantity,
              price: pricePerItem
            }
          ]
        })
      });

      const data = await res.json();
      const result = await stripe.confirmCardPayment(data.clientSecret, {
        payment_method: {
          card,
          billing_details: {
            name: name,
            email: email,
            address: { line1: address }
          }
        }
      });

      if (result.error) {
        document.getElementById("card-errors").textContent = result.error.message;
      } else {
        if (result.paymentIntent.status === "succeeded") {
          alert("Payment successful!");
          window.location.href = "confirmation.html";
        }
      }
    });
  </script>
</body>
</html>
